name: Deploy landing to GitHub Pages

# Builds the React landing example (examples/react-vite) into a static site and
# publishes it to GitHub Pages → https://yiwang3.github.io/vibepin/
# The vibepin dev overlay is a serve-only plugin, so it is absent from this build.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: examples/react-vite
        run: npm install
      - name: Build static site
        working-directory: examples/react-vite
        run: npx vite build --base=/vibepin/
      - name: Disable Jekyll
        run: touch examples/react-vite/dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react-vite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
