<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>vibepin · Electron example</title>
    <style>
      :root {
        --bg:#0f1012; --surface:#17181b; --surface-2:#1e2024; --border:#2a2d33;
        --text:#e9eaec; --muted:#8b9098; --accent:#3b82f6;
      }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text);
        font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .wrap { padding: 28px 28px 64px; }
      header { display:flex; align-items:baseline; gap:12px; margin-bottom:22px; }
      header h1 { font-size:20px; margin:0; }
      header .hint { color:var(--muted); font-size:13px; }
      .toolbar { display:flex; gap:8px; margin-bottom:18px; }
      .btn { background:var(--accent); color:#fff; border:0; border-radius:8px;
        padding:9px 16px; font:inherit; cursor:pointer; }
      .btn.secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
      .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
      .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
      .thumb { aspect-ratio:4/3; background:linear-gradient(135deg,#2b3a55,#1a2233); }
      .card:nth-child(2) .thumb { background:linear-gradient(135deg,#4a3b55,#221a2b); }
      .card:nth-child(3) .thumb { background:linear-gradient(135deg,#3b5547,#1a2b22); }
      .card:nth-child(4) .thumb { background:linear-gradient(135deg,#553b3b,#2b1a1a); }
      .meta { padding:12px 14px; }
      .meta .title { font-size:14px; font-weight:600; }
      .meta .sub { color:var(--muted); font-size:12px; margin-top:2px; }
      footer { margin-top:28px; color:var(--muted); font-size:12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Acme (Electron)</h1>
        <span class="hint">Press <b>Alt+A</b>, click anything, type a note, Send. Crops are pixel-perfect here.</span>
      </header>
      <div class="toolbar">
        <button class="btn">New</button>
        <button class="btn secondary">Filter</button>
        <button class="btn secondary">Export</button>
      </div>
      <div class="grid">
        <div class="card"><div class="thumb"></div><div class="meta"><div class="title">Onboarding flow</div><div class="sub">Updated 2 days ago</div></div></div>
        <div class="card"><div class="thumb"></div><div class="meta"><div class="title">Billing settings</div><div class="sub">12 plans</div></div></div>
        <div class="card"><div class="thumb"></div><div class="meta"><div class="title">Team directory</div><div class="sub">8 members</div></div></div>
        <div class="card"><div class="thumb"></div><div class="meta"><div class="title">Analytics</div><div class="sub">Last 30 days</div></div></div>
      </div>
      <footer>vibepin Electron example · overlay + capturePage injected in dev only</footer>
    </div>
  </body>
</html>
